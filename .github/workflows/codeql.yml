name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1' # Also runs every Monday at midnight / Ejecuta cada lunes a medianoche

jobs:
  analyze:
    name: Analyze code for vulnerabilities
    runs-on: ubuntu-latest
    steps:
      # Step 1: Get the code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Initialize CodeQL (GitHub's security analysis tool scanner)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: 'javascript' # Adjust this to the languages used in your project

      # Step 3: Run the analysis
      - name: Analyze
        uses: github/codeql-action/analyze@v2
        # Results appear in Github under Security > Code scanning alerts