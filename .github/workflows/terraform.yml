name: Terraform CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'infra/environments/**'
      - 'infra/modules/**'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/environments/**'
      - 'infra/modules/**'
env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.12.2

permissions:
  contents: read
  issues: write
  pull-requests: write  

jobs:
  plan-networking:
    name: Plan - networking
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: infra/environments/dev/networking
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Format (LINTER)
        run : terraform fmt -check
      - name: Terraform Init
        run : terraform init
      - name: Validate Syntax
        run : terraform validate
      - id: plan
        run: terraform plan -no-color
        env:
          TF_VAR_your_ip: '${{ secrets.TF_VAR_your_ip }}'
        continue-on-error: true
      - name: Comment Plan Output
        uses: actions/github-script@v6
        env:
          PLAN: '${{ steps.plan.outputs.stdout }}'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner, repo: context.repo.repo,
              body: '### networking Plan\n```\n' + process.env.PLAN + '\n```'            })

  plan-data:
    name: Plan - data
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: infra/environments/dev/data
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Format (LINTER)
        run : terraform fmt -check
      - name: Terraform Init
        run : terraform init
      - name: Validate Syntax
        run : terraform validate
      - id: plan
        run: terraform plan -no-color
        env:
          TF_VAR_db_password: '${{ secrets.TF_VAR_db_password }}'
        continue-on-error: true
      - name: Comment Plan Output
        uses: actions/github-script@v6
        env:
          PLAN: '${{ steps.plan.outputs.stdout }}'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner, repo: context.repo.repo,
              body: '### data Plan\n```\n' + process.env.PLAN + '\n```'            })              
  plan-compute:
    name: Plan - compute
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: infra/environments/dev/compute
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Format (LINTER)
        run : terraform fmt -check
      - name: Terraform Init
        run : terraform init
      - name: Validate Syntax
        run : terraform validate
      - id: plan
        run: terraform plan -no-color
        env:
          TF_VAR_alert_email: '${{ secrets.TF_VAR_alert_email }}'
        continue-on-error: true
      - name: Comment Plan Output
        uses: actions/github-script@v6
        env:
          PLAN: '${{ steps.plan.outputs.stdout }}'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner, repo: context.repo.repo,
              body: '### compute Plan\n```\n' + process.env.PLAN + '\n```'            })

  apply-networking:
    name: Apply - networking
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: infra/environments/dev/networking
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init
        run : terraform init
      - name: Terraform Apply
        run : terraform apply -auto-approve
        env:
          TF_VAR_your_ip: '${{ secrets.TF_VAR_your_ip }}'
  
  apply-data:
    name: Apply - data
    needs: apply-networking
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: infra/environments/dev/data
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init
        run : terraform init
      - name: Terraform Apply
        run : terraform apply -auto-approve
        env:
          TF_VAR_db_password: '${{ secrets.TF_VAR_db_password }}'
  apply-compute:
    name: Apply - compute
    needs: apply-data
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: infra/environments/dev/compute
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:       
          terraform_version: ${{ env.TF_VERSION }}
      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init
        run : terraform init
      - name: Terraform Apply
        run : terraform apply -auto-approve
        env:
          TF_VAR_alert_email: '${{ secrets.TF_VAR_alert_email }}'
      - run: terraform output
      
