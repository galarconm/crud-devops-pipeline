name: Deploy Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"] # Only trigger this workflow after the CI pipeline runs
    types:
      - completed
    branches:
      - main # Only trigger on the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run this job if the  CI pipeline succeeded ci.yml
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
  

    steps:
      #Step 1: Download code
      - name: Checkout code
        uses: actions/checkout@v3

      #Step 2: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      #Step 3: Build Docker Image
      - name: Build Docker image
        run: docker build -t crud-backend ./backend

      #Step 4: Push Docker image to AWS ECR
      - name: Push to AWS ECR
        run: |
          # Create the repository if it doesn't exist yet
          aws ecr create-repository --repository-name crud-backend 2>/dev/null || true

          # Log in to ECR
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

          #Tag the image 
          docker tag crud-backend:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/crud-backend:latest

          #Push the image to ECR
          docker push \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/crud-backend:latest

      # Step 5: Restart the K8s deployment (zero downtime)
      #- name: Deploy to Kubernetes
      #  run: kubectl rollout restart deployment/crud-backend
      #Nota: configurar despues para deploy en EKS, por ahora se deja asi para no complicar el pipeline

          